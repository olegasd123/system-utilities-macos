name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.3. Leave empty to bump VERSION patch."
        required: false
      build_number:
        description: "Internal build number. Defaults to the workflow run number."
        required: false
      draft:
        description: "Create the GitHub release as a draft"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    env:
      APP_NAME: System Monitor
      RELEASE_DMG: dist/System-Monitor.dmg
      SIGN_IDENTITY: "Developer ID Application: Oleg Verkhohliad (A9N92VGA2M)"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve release values
        run: |
          FILE_VERSION="$(sed -n '1p' VERSION | tr -d '[:space:]')"
          RELEASE_NOTES_REF="$(git rev-parse HEAD)"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            BUILD_NUMBER="${{ inputs.build_number }}"
            DRAFT="${{ inputs.draft }}"
            if [ -z "$VERSION" ]; then
              VERSION="$(awk -F. '
                NF == 3 && $1 ~ /^[0-9]+$/ && $2 ~ /^[0-9]+$/ && $3 ~ /^[0-9]+$/ {
                  printf "%d.%d.%d\n", $1, $2, $3 + 1
                  ok = 1
                }
                END { if (!ok) exit 1 }
              ' VERSION)" || {
                echo "VERSION must use numeric MAJOR.MINOR.PATCH format for automatic bump." >&2
                exit 1
              }
            fi
            TAG_NAME="v$VERSION"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
            VERSION="${TAG_NAME#v}"
            BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
            DRAFT="false"
          fi

          if [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          fi

          if [ -z "$VERSION" ]; then
            echo "Release version is missing. Set VERSION or pass a version input." >&2
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
          echo "DRAFT=$DRAFT" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES_REF=$RELEASE_NOTES_REF" >> "$GITHUB_ENV"
          echo "SPARKLE_FEED_URL=https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/appcast.xml" >> "$GITHUB_ENV"
          echo "DOWNLOAD_URL=https://github.com/${GITHUB_REPOSITORY}/releases/download/$TAG_NAME/System-Monitor.dmg" >> "$GITHUB_ENV"

      - name: Update VERSION for manual release
        if: github.event_name == 'workflow_dispatch'
        run: |
          FILE_VERSION="$(sed -n '1p' VERSION | tr -d '[:space:]')"
          if [ "$VERSION" = "$FILE_VERSION" ]; then
            echo "VERSION is already $VERSION."
            exit 0
          fi

          if [ "${GITHUB_REF_TYPE}" != "branch" ]; then
            echo "Run manual releases from a branch when VERSION needs an update." >&2
            exit 1
          fi

          printf '%s\n' "$VERSION" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "Release $TAG_NAME"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Check Sparkle secrets
        run: |
          if [ -z "${SPARKLE_PUBLIC_ED_KEY}" ]; then
            echo "Missing SPARKLE_PUBLIC_ED_KEY secret." >&2
            exit 1
          fi

          if [ -z "${SPARKLE_PRIVATE_KEY}" ]; then
            echo "Missing SPARKLE_PRIVATE_KEY secret." >&2
            exit 1
          fi
        env:
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}

      - name: Check signing secrets
        run: |
          if [ -z "${DEVELOPER_ID_CERTIFICATE_P12}" ]; then
            echo "Missing DEVELOPER_ID_CERTIFICATE_P12 secret." >&2
            exit 1
          fi

          if [ -z "${DEVELOPER_ID_CERTIFICATE_PASSWORD}" ]; then
            echo "Missing DEVELOPER_ID_CERTIFICATE_PASSWORD secret." >&2
            exit 1
          fi
        env:
          DEVELOPER_ID_CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}

      - name: Check notarization secrets
        run: |
          if [ -z "${APPLE_ID}" ]; then
            echo "Missing APPLE_ID secret." >&2
            exit 1
          fi

          if [ -z "${TEAM_ID}" ]; then
            echo "Missing TEAM_ID secret." >&2
            exit 1
          fi

          if [ -z "${APP_SPECIFIC_PASSWORD}" ]; then
            echo "Missing APP_SPECIFIC_PASSWORD secret." >&2
            exit 1
          fi
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}

      - name: Run tests
        run: swift test

      - name: Install signing certificate
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          printf '%s' "$DEVELOPER_ID_CERTIFICATE_P12" | base64 -D > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          rm -f "$CERTIFICATE_PATH"
        env:
          DEVELOPER_ID_CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}

      - name: Build app bundle
        run: scripts/build_app.sh
        env:
          SIGN_IDENTITY: ${{ env.SIGN_IDENTITY }}
          VERSION: ${{ env.VERSION }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
          SPARKLE_FEED_URL: ${{ env.SPARKLE_FEED_URL }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}

      - name: Create DMG
        run: |
          scripts/make_dmg.sh
          mv "dist/${APP_NAME}.dmg" "$RELEASE_DMG"

      - name: Notarize DMG
        run: scripts/notarize_dmg.sh
        env:
          DMG_PATH: ${{ env.RELEASE_DMG }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}

      - name: Create appcast
        run: |
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$SPARKLE_PRIVATE_KEY_FILE"
          scripts/make_appcast.sh
          rm -f "$SPARKLE_PRIVATE_KEY_FILE"
        env:
          DMG_PATH: ${{ env.RELEASE_DMG }}
          VERSION: ${{ env.VERSION }}
          SHORT_VERSION: ${{ env.VERSION }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
          DOWNLOAD_URL: ${{ env.DOWNLOAD_URL }}
          APPCAST_LINK: https://github.com/${{ github.repository }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          SPARKLE_PRIVATE_KEY_FILE: ${{ runner.temp }}/sparkle_private_key

      - name: Write release notes
        run: |
          {
            echo "System Monitor $VERSION"
            echo
            git log -1 --pretty=%B "$RELEASE_NOTES_REF"
          } > dist/release-notes.md

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_FLAGS=""
          LATEST_FLAGS="--latest"
          if [ "$DRAFT" = "true" ]; then
            RELEASE_FLAGS="--draft"
            LATEST_FLAGS=""
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --title "$TAG_NAME" \
              --notes-file dist/release-notes.md \
              $LATEST_FLAGS
            gh release upload "$TAG_NAME" "$RELEASE_DMG" dist/appcast.xml --clobber
          else
            gh release create "$TAG_NAME" "$RELEASE_DMG" dist/appcast.xml \
              --title "$TAG_NAME" \
              --notes-file dist/release-notes.md \
              --target "$(git rev-parse HEAD)" \
              $LATEST_FLAGS \
              $RELEASE_FLAGS
          fi
